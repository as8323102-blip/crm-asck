server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets con hash en el nombre (cambian en cada build): cachear a largo plazo.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Entrada de la SPA: NUNCA cachear el index -> siempre revalida y nunca se
    # queda pegado a un deploy viejo (causa del "no se ve" por cache del navegador).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA: cualquier ruta desconocida sirve index.html (React Router del lado cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
